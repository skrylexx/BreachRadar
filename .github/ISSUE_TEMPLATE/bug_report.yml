name: Bug Report
description: Signaler un bug ou un comportement inattendu
title: "[BUG] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Merci de prendre le temps de signaler ce bug pour améliorer BreachRadar ! 🛡️
  - type: textarea
    id: description
    attributes:
      label: Description du Bug
      description: Une description claire et concise de ce qui se passe.
      placeholder: Lorsque je clique sur le bouton X, l'application crashe...
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Étapes pour reproduire
      description: Comment faire pour reproduire ce bug ?
      placeholder: |
        1. Aller sur '...'
        2. Cliquer sur '....'
        3. Voir l'erreur
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Comportement attendu
      description: Qu'auriez-vous voulu qu'il se passe ?
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Système d'exploitation & Navigateur
      placeholder: ex. Windows 11, Chrome 120
  - type: textarea
    id: logs
    attributes:
      label: Logs / Captures d'écran
      description: Ajoutez ici les logs d'erreur (Docker, console du navigateur) ou des captures d'écran si pertinent.
