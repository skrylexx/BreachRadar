name: Bug Report / Signaler un Bug
description: Report a bug or unexpected behavior / Signaler un bug ou un comportement inattendu
title: "[BUG] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report this bug to improve BreachRadar! 🛡️
        Merci de prendre le temps de signaler ce bug pour améliorer BreachRadar !
  - type: textarea
    id: description
    attributes:
      label: Bug Description / Description du Bug
      description: A clear and concise description of what is happening. / Une description claire et concise de ce qui se passe.
      placeholder: When I click on button X, the application crashes... / Lorsque je clique sur le bouton X, l'application crashe...
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce / Étapes pour reproduire
      description: How to reproduce this bug? / Comment faire pour reproduire ce bug ?
      placeholder: |
        1. Go to '...'
        2. Click on '....'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior / Comportement attendu
      description: What should have happened? / Qu'auriez-vous voulu qu'il se passe ?
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS & Browser / Système d'exploitation & Navigateur
      placeholder: e.g. Windows 11, Chrome 120
  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots / Logs / Captures d'écran
      description: Add error logs (Docker, browser console) or screenshots if relevant. / Ajoutez ici les logs d'erreur (Docker, console du navigateur) ou des captures d'écran si pertinent.
