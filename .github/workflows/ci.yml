name: CI - Security & Quality Checks

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─── SECTION SÉCURITÉ (SECRETS & SCA) ──────────────────────────────────────
  security-audit:
    name: 🛡️ Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 🔑 Detect Secrets
        uses: reviewdog/action-detect-secrets@v0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-check

      - name: 📦 Frontend Audit (NPM)
        if: success() || failure()
        run: cd frontend && npm audit --audit-level=high

      - name: ⚡ Install uv
        if: success() || failure()
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          version: "latest"

      - name: 🐍 Backend Audit (pip-audit)
        if: success() || failure()
        run: |
          cd backend
          uv export --format requirements-txt --no-hashes > req.txt
          uvx pip-audit -r req.txt

  # ─── SECTION BACKEND (PYTHON) ─────────────────────────────────────────────
  backend-checks:
    name: 🐍 Backend Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: ⚡ Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          version: "latest"

      - name: 🐍 Set up Python
        run: uv python install 3.12

      - name: 🛠️ Install dependencies
        run: |
          cd backend
          uv sync --frozen --all-extras

      - name: 🔍 Lint & Format (Ruff)
        run: cd backend && uv run ruff check app/ tests/

      - name: 🔍 Type Check (Mypy)
        if: success() || failure()
        run: cd backend && uv run mypy app/

      - name: 🛡️ Security Lint (Bandit)
        if: success() || failure()
        run: cd backend && uv run bandit -r app/ -ll

      - name: 🧪 Run Unit & Security Tests
        if: success() || failure()
        run: cd backend && uv run pytest tests/ -v

  # ─── SECTION FRONTEND (NEXT.JS) ────────────────────────────────────────────
  frontend-checks:
    name: ⚛️ Frontend Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 🟢 Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 💾 Cache Next.js build
        uses: actions/cache@v4
        with:
          path: frontend/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('frontend/package-lock.json') }}-${{ hashFiles('frontend/src/**') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('frontend/package-lock.json') }}-

      - name: 🛠️ Install dependencies
        run: cd frontend && npm install

      - name: 🔍 Lint (ESLint)
        run: cd frontend && npm run lint

      - name: 🏗️ Build Check
        if: success() || failure()
        run: cd frontend && npm run build
        env:
          NEXT_PUBLIC_API_URL: "http://localhost:8000"
          NEXT_PUBLIC_TARGET_DOMAIN: "example.com"
          TARGET_DOMAIN: "example.com"

  # ─── SECTION DOCKER (BUILD CHECK) ──────────────────────────────────────────
  docker-checks:
    name: 🐳 Docker Build Verify
    needs: [security-audit, backend-checks, frontend-checks]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 🏗️ Build Backend Image
        run: docker build -t breachradar-api-test ./backend

      - name: 🏗️ Build Frontend Image
        if: success() || failure()
        run: docker build -t breachradar-ui-test ./frontend
