name: CI - Security & Quality Checks

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ─── SECTION SÉCURITÉ (SECRETS & SCA) ──────────────────────────────────────
  security-audit:
    name: 🛡️ Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 🔑 Detect Secrets
        uses: reviewdog/action-detect-secrets@v0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-check

      - name: 📦 Frontend Audit (NPM)
        run: cd frontend && npm audit --audit-level=high

      - name: 🐍 Backend Audit (pip-audit)
        run: |
          cd backend
          pip install pip-audit
          pip-audit

  # ─── SECTION BACKEND (PYTHON) ─────────────────────────────────────────────
  backend-checks:
    name: 🐍 Backend Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: ⚡ Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          version: "latest"

      - name: 🐍 Set up Python
        run: uv python install 3.12

      - name: 🛠️ Install dependencies
        run: |
          cd backend
          uv pip install --system -e ".[dev,pdf]"

      - name: 🔍 Lint & Format (Ruff)
        run: cd backend && uv run ruff check app/ tests/

      - name: 🧪 Run Unit Tests
        run: cd backend && uv run pytest tests/ -v

      - name: 🛡️ Run Security Tests
        run: cd backend && uv run pytest tests/test_security.py -v

  # ─── SECTION FRONTEND (NEXT.JS) ────────────────────────────────────────────
  frontend-checks:
    name: ⚛️ Frontend Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 🟢 Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 🛠️ Install dependencies
        run: cd frontend && npm ci

      - name: 🔍 Lint (ESLint)
        run: cd frontend && npm run lint

      - name: 🏗️ Build Check
        run: cd frontend && npm run build
        env:
          NEXT_PUBLIC_API_URL: "http://localhost:8000"
          NEXT_PUBLIC_TARGET_DOMAIN: "example.com"
          TARGET_DOMAIN: "example.com"

  # ─── SECTION DOCKER (BUILD CHECK) ──────────────────────────────────────────
  docker-checks:
    name: 🐳 Docker Build Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 🏗️ Build Backend Image
        run: docker build -t breachradar-api-test ./backend

      - name: 🏗️ Build Frontend Image
        run: docker build -t breachradar-ui-test ./frontend
