# sources.yaml — Activation/désactivation de chaque source
# Modifier ce fichier pour activer ou désactiver des sources sans toucher au code.
# Une source désactivée ici est ignorée même si sa clé API est configurée dans .env.

sources:

  # ─── Sources gratuites (priorité haute) ─────────────────────────────────────

  hibp:
    enabled: true
    description: "HaveIBeenPwned — vérification email par email (rate limit 1500ms)"
    requires_api_key: true
    env_key: "HIBP_API_KEY"
    rate_limit_ms: 1500

  hibp_domain:
    enabled: false   # Nécessite un abonnement Domain Search (~550 USD/an)
    description: "HaveIBeenPwned — Domain Search (scan complet d'un domaine)"
    requires_api_key: true
    env_key: "HIBP_API_KEY"

  github:
    enabled: true
    description: "GitHub — recherche de credentials hardcodés dans les repos publics"
    requires_api_key: false   # Fonctionne sans token (60 req/h) mais recommandé
    env_key: "GITHUB_TOKEN"
    rate_limit_ms: 100
    monitors:
      - name: "Domain Mentions"
        type: "search"
        query: "{target_domain}"

  gitlab:
    enabled: false   # Activer si vous avez un token GitLab
    description: "GitLab — recherche dans les repos publics"
    requires_api_key: false
    env_key: "GITLAB_TOKEN"

  urlscan:
    enabled: true
    description: "URLScan.io — détection de pages de phishing imitant le domaine"
    requires_api_key: true
    env_key: "URLSCAN_API_KEY"

  otx:
    enabled: true
    description: "AlienVault OTX — indicateurs de compromission liés au domaine"
    requires_api_key: true
    env_key: "OTX_API_KEY"

  # ─── Sources payantes ────────────────────────────────────────────────────────

  leakcheck:
    enabled: false   # Activer si vous avez une clé LeakCheck
    description: "LeakCheck.io — base de données de leaks consolidée"
    requires_api_key: true
    env_key: "LEAKCHECK_API_KEY"

  dehashed:
    enabled: false   # Activer si vous avez un compte Dehashed
    description: "Dehashed — 15+ milliards de records, recherche email/domaine"
    requires_api_key: true
    env_key: "DEHASHED_API_KEY"

  intelx:
    enabled: false   # Activer si vous avez un compte IntelX
    description: "Intelligence X — indexation dark web, Tor, I2P, paste sites"
    requires_api_key: true
    env_key: "INTELX_API_KEY"

  shodan:
    enabled: false   # Activer pour surveiller l'exposition infrastructure
    description: "Shodan — infrastructure exposée sur Internet"
    requires_api_key: true
    env_key: "SHODAN_API_KEY"

  # ─── Monitoring de flux ──────────────────────────────────────────────────────

  pastebin:
    enabled: false   # Requiert compte Pro Pastebin (~5 USD/mois)
    description: "Pastebin scraping — détection de dumps mentionnant le domaine"
    requires_api_key: false   # Accès basé sur l'IP (whitelist)

  telegram:
    enabled: false   # Requiert credentials Telegram (canaux publics uniquement)
    description: "Telegram — monitoring des canaux publics de partage de leaks"
    requires_api_key: true
    env_key: "TELEGRAM_API_ID"

  rss:
    enabled: true
    description: "RSS feeds — CERT, CISA, ANSSI, blogs sécurité"
    requires_api_key: false
    feeds:
      - name: "BleepingComputer"
        url: "https://www.bleepingcomputer.com/feed/"
        category: "News"
      - name: "The Hacker News"
        url: "https://thehackernews.com/feeds/posts/default"
        category: "News"
      - name: "CERT-FR (Alertes)"
        url: "https://www.cert.ssi.gouv.fr/alerte/feed/"
        category: "Alerts"
      - name: "CISA (Current Activity)"
        url: "https://www.cisa.gov/uscert/ncas/current-activity.xml"
        category: "Alerts"

  # ─── RansomLook — Surveillance ransomware ────────────────────────────────────

  ransomlook:
    enabled: true    # FORTEMENT RECOMMANDÉ — gratuit et critique
    description: >
      RansomLook — détection si le domaine est listé sur un portail d'extorsion
      ransomware. Seule source couvrant le scénario de compromission en cours.
      Nécessite l'instance Docker (voir docker-compose.yml).
    requires_api_key: false   # Pas de clé nécessaire pour l'instance auto-hébergée
    env_key: "RANSOMLOOK_URL"
    rate_limit_ms: 500   # Requêtes locales — pas de rate limit strict
    alert_on_finding: true   # Alerte immédiate à la détection
