# docker-compose.yml — BreachRadar + RansomLook + WebUI stack
# ⚠️  Sécurité : RansomLook exposé UNIQUEMENT sur 127.0.0.1:8888 (jamais 0.0.0.0)
#
# Usage :
#   Stack CLI uniquement : docker compose up -d
#   Stack CLI + WebUI    : docker compose --profile ui up -d

services:

  # ─── RansomLook — Redis (stockage des données scrapées) ─────────────────────
  ransomlook-redis:
    image: redis:7-alpine
    container_name: ransomlook-redis
    restart: unless-stopped
    volumes:
      - ransomlook_redis_data:/data
    networks:
      - ransomlook_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── RansomLook — Tor (accès aux portails .onion des groupes ransomware) ─────
  ransomlook-tor:
    image: dperson/torproxy:latest
    container_name: ransomlook-tor
    restart: unless-stopped
    networks:
      - ransomlook_net
    environment:
      - TOR_MaxCircuitDirtiness=600
    healthcheck:
      test: ["CMD", "curl", "--socks5", "localhost:9050", "https://check.torproject.org/api/ip"]
      interval: 30s
      timeout: 15s
      retries: 5

  # ─── RansomLook — Application principale ────────────────────────────────────
  ransomlook-app:
    image: travishunting/ransomlook:latest
    container_name: ransomlook-app
    restart: unless-stopped
    depends_on:
      ransomlook-redis:
        condition: service_healthy
      ransomlook-tor:
        condition: service_healthy
    ports:
      # Exposé UNIQUEMENT en localhost — jamais sur 0.0.0.0
      - "${RANSOMLOOK_HOST:-127.0.0.1}:${RANSOMLOOK_PORT:-8888}:8888"
    networks:
      - ransomlook_net
    environment:
      - REDIS_HOST=ransomlook-redis
      - REDIS_PORT=6379
      - TOR_PROXY=socks5://ransomlook-tor:9050
      - REFRESH_INTERVAL=3600   # Rafraîchissement toutes les heures
      - LOG_LEVEL=WARNING
    volumes:
      - ransomlook_app_data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/api/v1/stats"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s   # Laisser le temps au premier scraping



  # ═══════════════════════════════════════════════════════════════════════════
  # ─── BreachRadar WebUI ──────────────────────────────────────────────────────
  # Démarrer la stack complète avec : docker compose up -d
  # ═══════════════════════════════════════════════════════════════════════════

  # ─── WebUI — PostgreSQL 16 ──────────────────────────────────────────────────
  breachradar-postgres:
    image: postgres:16-alpine
    container_name: breachradar-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${UI_DB_NAME:-breachradar_ui}
      POSTGRES_USER: ${UI_DB_USER:-br_ui}
      POSTGRES_PASSWORD: ${UI_DB_PASSWORD:?UI_DB_PASSWORD required for WebUI}
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - ui_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${UI_DB_USER:-br_ui} -d ${UI_DB_NAME:-breachradar_ui}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── WebUI — Redis (sessions JWT + rate limiting) ────────────────────────────
  breachradar-ui-redis:
    image: redis:7-alpine
    container_name: breachradar-ui-redis
    restart: unless-stopped
    command: redis-server --requirepass ${UI_REDIS_PASSWORD:?UI_REDIS_PASSWORD required}
    volumes:
      - ui_redis_data:/data
    networks:
      - ui_net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${UI_REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── WebUI — Backend FastAPI ─────────────────────────────────────────────────
  breachradar-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: breachradar-api
    restart: unless-stopped
    depends_on:
      breachradar-postgres:
        condition: service_healthy
      breachradar-ui-redis:
        condition: service_healthy
    ports:
      - "${API_HOST:-127.0.0.1}:${API_PORT:-8000}:8000"  # API interne uniquement
    environment:
      # Base de données
      - DATABASE_URL=postgresql+asyncpg://${UI_DB_USER:-br_ui}:${UI_DB_PASSWORD}@breachradar-postgres:5432/${UI_DB_NAME:-breachradar_ui}
      # Redis
      - REDIS_URL=redis://:${UI_REDIS_PASSWORD}@breachradar-ui-redis:6379/0
      # JWT
      - JWT_SECRET_KEY=${UI_JWT_SECRET:?UI_JWT_SECRET required}
      - JWT_ALGORITHM=HS256
      - JWT_ACCESS_TOKEN_EXPIRE_MINUTES=15
      - JWT_REFRESH_TOKEN_EXPIRE_DAYS=7
      # Admin initial (créé au 1er démarrage)
      - INITIAL_ADMIN_EMAIL=${UI_ADMIN_EMAIL:?UI_ADMIN_EMAIL required}
      - INITIAL_ADMIN_PASSWORD=${UI_ADMIN_PASSWORD:?UI_ADMIN_PASSWORD required}
      # CORS — le frontend Next.js
      - CORS_ORIGINS=${CORS_ORIGINS:-["http://localhost:3000"]}
      # Environment
      - ENVIRONMENT=${ENVIRONMENT:-production}
      # Communication avec RansomLook
      - RANSOMLOOK_MODE=${RANSOMLOOK_MODE:-local}
      - RANSOMLOOK_LOCAL_URL=${RANSOMLOOK_LOCAL_URL:-http://ransomlook-app:8888}
      - RANSOMLOOK_SAAS_API_URL=${RANSOMLOOK_SAAS_API_URL:-https://www.ransomlook.io/api}
      - RANSOMLOOK_SAAS_API_KEY=${RANSOMLOOK_SAAS_API_KEY:-}
      - RANSOMLOOK_SEARCH_TERMS=${RANSOMLOOK_SEARCH_TERMS:-[]}
      - RANSOMLOOK_ALERT_EMAIL=${RANSOMLOOK_ALERT_EMAIL:-}
      - RANSOMLOOK_ALERT_WEBHOOK=${RANSOMLOOK_ALERT_WEBHOOK:-}
    networks:
      - ui_net
      - ransomlook_net  # Pour accéder à RansomLook local si mode=local
    volumes:
      - ./reports:/app/reports
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─── WebUI — Frontend Next.js ────────────────────────────────────────────────
  breachradar-ui:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # ── Variables injectées AU BUILD (résolues par next.config.ts) ──
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
        - TARGET_DOMAIN=${TARGET_DOMAIN:-}
        - NEXT_PUBLIC_TARGET_DOMAIN=${TARGET_DOMAIN:-}
    container_name: breachradar-ui
    restart: unless-stopped
    depends_on:
      breachradar-api:
        condition: service_healthy
    ports:
      - "${UI_HOST:-127.0.0.1}:${UI_PORT:-3000}:3000"
    networks:
      - ui_net
    environment:
      # ── Variables disponibles au RUNTIME (Server Components, rewrites) ──
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://breachradar-api:8000}
      # TARGET_DOMAIN est lu côté serveur par le Server Component (dashboard/layout.tsx)
      # Il DOIT être présent ici en plus du build arg pour être accessible au runtime.
      - TARGET_DOMAIN=${TARGET_DOMAIN:-}
      - NEXT_PUBLIC_TARGET_DOMAIN=${TARGET_DOMAIN:-}
      - NODE_ENV=production

# ─── Volumes persistants ────────────────────────────────────────────────────
volumes:
  ransomlook_redis_data:
    driver: local
  ransomlook_app_data:
    driver: local
  pg_data:
    driver: local
  ui_redis_data:
    driver: local

# ─── Réseaux isolés ─────────────────────────────────────────────────────────
networks:
  ransomlook_net:
    driver: bridge
  ui_net:
    driver: bridge
